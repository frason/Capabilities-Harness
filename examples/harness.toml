# Capability Harness — Project Configuration
# See docs/quickstart.md for a step-by-step guide
# Reference: cap config validate --config harness.toml

[state]
# SQLite by default; set to postgresql://user:pass@host/db for Postgres
database_url = "sqlite:///harness.db"

[artifacts]
root_path = ".harness/artifacts"
hash_algorithm = "sha256"

[policy]
# human: requires `cap review approve <id>` before merge
# auto: merges automatically after validation passes
merge = "human"
approval = "required"

[policy.retry]
max_attempts = 3
backoff_seconds = 2.0

[policy.routing]
prefer_local = false
provider_allowlist = []   # empty = allow all registered runtimes

[policy.context]
token_budget = 100000
required_layers = ["repository", "task"]

[policy.concurrency]
max_concurrent_tasks = 4

[telemetry]
enabled = true
exporter = "json"         # json | otlp | none
# otlp_endpoint = "http://localhost:4317"

[validation]
stages = ["formatting", "lint", "typecheck", "unit_tests", "ai_review"]
fail_fast = true

# ---------------------------------------------------------------------------
# Providers — one section per inference provider
# The Runtime never knows which provider runs. Routing selects by name.
# ---------------------------------------------------------------------------

[providers.anthropic]
model = "claude-sonnet-4-6"
# api_key = ""   # leave blank to read ANTHROPIC_API_KEY from environment

[providers.ollama]
model = "phi3"
base_url = "http://localhost:11434"
timeout_seconds = 120

[providers.openai]
model = "gpt-4o"
# api_key = ""   # leave blank to read OPENAI_API_KEY from environment

# ---------------------------------------------------------------------------
# Benchmark profiles — change active_profile to switch execution strategy.
# No orchestration code changes when switching profiles.
# ---------------------------------------------------------------------------

# Active profile (override with CH_ACTIVE_PROFILE env var)
active_profile = "quality"

[profiles.quality]
# All capabilities execute through Anthropic.
# Purpose: compare orchestration quality against other frameworks
# while holding the underlying model constant.
default_provider = "anthropic"

[profiles.quality.assignments]
planner    = "anthropic"
coder      = "anthropic"
review     = "anthropic"
tester     = "anthropic"
documenter = "anthropic"

[profiles.hybrid]
# Planner and review use Anthropic; implementation uses Ollama.
# Purpose: measure cost/throughput in a mixed-provider environment.
default_provider = "anthropic"

[profiles.hybrid.assignments]
planner    = "anthropic"
coder      = "ollama"
review     = "anthropic"
tester     = "ollama"
documenter = "ollama"

[profiles.local]
# All capabilities execute through Ollama.
# Purpose: fully local execution for offline or cost-sensitive scenarios.
default_provider = "ollama"

[profiles.local.assignments]
planner    = "ollama"
coder      = "ollama"
review     = "ollama"
tester     = "ollama"
documenter = "ollama"
